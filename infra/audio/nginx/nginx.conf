events {}

http {
  server {
    listen 8090;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /healthz {
      default_type application/json;
      return 200 '{"ok":true,"stack":"audio","stage":"1"}';
    }

    location /hls/ {
      default_type text/plain;
      add_header Cache-Control "no-store";
      return 503 "Audio HLS is not wired yet. Continue with stage 2.\n";
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}