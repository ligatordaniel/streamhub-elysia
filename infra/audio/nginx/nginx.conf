events {}

http {
  server {
    listen 8090;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /healthz {
      default_type application/json;
      return 200 '{"ok":true,"stack":"audio","stage":"6"}';
    }

    location = /hls {
      default_type application/json;
      return 410 '{"error":"Use /hls/<streamingAlias>/<publishKey>/live.m3u8."}';
    }

    location = /hls/ {
      default_type application/json;
      return 410 '{"error":"Use /hls/<streamingAlias>/<publishKey>/live.m3u8."}';
    }

    location = /status {
      add_header Access-Control-Allow-Origin "*" always;
      add_header Cache-Control "no-store";
      proxy_hide_header Access-Control-Allow-Origin;
      proxy_http_version 1.1;
      proxy_buffering off;
      proxy_request_buffering off;
      proxy_redirect off;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_pass http://icecast:8000/status-json.xsl;
    }

    location ~ "^/mount/([0-9A-Za-z]{12})$" {
      default_type application/json;
      return 410 '{"error":"Connect your source directly to the Icecast port (AUDIO_LIVE_SOURCE_PORT). The gateway does not proxy source connections."}';
    }

    location ~ "^/live/([0-9A-Za-z]{12})$" {
      default_type application/json;
      return 410 '{"error":"Connect your source directly to the Icecast port (AUDIO_LIVE_SOURCE_PORT). The gateway does not proxy source connections."}';
    }

    location ~ "^/listen/([0-9a-f]{16})/([0-9a-f]{16})/radio\.mp3$" {
      add_header Access-Control-Allow-Origin "*" always;
      add_header Cache-Control "no-store";
      proxy_hide_header Access-Control-Allow-Origin;
      rewrite "^/listen/([0-9a-f]{16})/([0-9a-f]{16})/radio\.mp3$" /streams/$1/$2/radio.mp3 break;
      proxy_http_version 1.1;
      proxy_buffering off;
      proxy_request_buffering off;
      proxy_redirect off;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_pass http://icecast:8000;
    }

    location ~ "^/listen/([0-9a-f]{16})/([0-9a-f]{16})/radio\.aac$" {
      add_header Access-Control-Allow-Origin "*" always;
      add_header Cache-Control "no-store";
      proxy_hide_header Access-Control-Allow-Origin;
      rewrite "^/listen/([0-9a-f]{16})/([0-9a-f]{16})/radio\.aac$" /streams/$1/$2/radio.aac break;
      proxy_http_version 1.1;
      proxy_buffering off;
      proxy_request_buffering off;
      proxy_redirect off;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_pass http://icecast:8000;
    }

    location = /listen/radio.mp3 {
      default_type application/json;
      return 410 '{"error":"Use /listen/<streamingAlias>/<publishKey>/radio.mp3."}';
    }

    location = /listen/radio.aac {
      default_type application/json;
      return 410 '{"error":"Use /listen/<streamingAlias>/<publishKey>/radio.aac."}';
    }

    location /admin/ {
      add_header Cache-Control "no-store";
      proxy_http_version 1.1;
      proxy_buffering off;
      proxy_request_buffering off;
      proxy_redirect off;
      proxy_set_header Authorization $http_authorization;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_pass http://icecast:8000/admin/;
    }

    location = /hls/live.m3u8 {
      default_type application/json;
      return 410 '{"error":"Use /hls/<streamingAlias>/<publishKey>/live.m3u8."}';
    }

    location ~ "^/hls/([0-9a-f]{16})/([0-9a-f]{16})/live\.m3u8$" {
      add_header Access-Control-Allow-Origin "*" always;
      add_header Cache-Control "no-store" always;
      types {
        application/vnd.apple.mpegurl m3u8;
      }
      alias /usr/share/nginx/audio-hls/$1/$2/live.m3u8;
    }

    location ~ "^/hls/([0-9a-f]{16})/([0-9a-f]{16})/(live[0-9]+\.ts)$" {
      add_header Access-Control-Allow-Origin "*" always;
      add_header Cache-Control "no-store" always;
      types {
        video/mp2t ts;
      }
      alias /usr/share/nginx/audio-hls/$1/$2/$3;
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}