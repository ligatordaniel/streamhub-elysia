services:
  mediamtx:
    image: bluenviron/mediamtx:1.18.2
    command: /mediamtx.yml
    ports:
      - '1935:1935'
      - '8189:8189/udp'
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
      - ./recordings:/recordings
    restart: unless-stopped
    networks:
      - streaming

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - mediamtx
    ports:
      - '8080:8080'
      - '8082:8082'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    networks:
      - streaming

networks:
  streaming:
    driver: bridge
